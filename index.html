<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Trắc Nghiệm Từ File Word</title>
    <!-- Tích hợp thư viện đọc file Word trực tiếp trên trình duyệt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #333; font-size: 24px; }
        .upload-section {
            border: 2px dashed #007bff;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            background: #f0f7ff;
            margin-bottom: 20px;
        }
        .file-input-label {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            font-weight: bold;
        }
        #word-files { display: none; }
        .progress-bar {
            background: #eee; height: 10px; border-radius: 5px;
            margin-bottom: 20px; overflow: hidden; display: none;
        }
        .progress { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.3s; }
        .question-box { margin-bottom: 20px; display: none; }
        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            padding: 12px; border: 2px solid #ddd; border-radius: 6px;
            background: white; cursor: pointer; text-align: left;
            font-size: 16px; transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { background: #f0f0f0; border-color: #bbb; }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--success-color) !important; color: #155724; }
        .option-btn.wrong { background-color: #f8d7da !important; border-color: var(--danger-color) !important; color: #721c24; }
        .controls { margin-top: 20px; display: none; justify-content: space-between; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; background: var(--primary-color); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .score-box { text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="quiz-title">Ôn Tập Trắc Nghiệm Tư Tưởng HCM</h1>
    
    <!-- Vùng tải file Word lên -->
    <div id="upload-area" class="upload-section">
        <p style="margin-bottom: 15px; color: #555;">Tải lên các file câu hỏi Word (.docx) của bạn để bắt đầu làm bài</p>
        <label class="file-input-label" for="word-files">Chọn các file Word (.docx)</label>
        <input type="file" id="word-files" accept=".docx" multiple onchange="handleFiles(this.files)">
        <p id="status-text" style="margin-top: 10px; font-size: 14px; color: #666;"></p>
    </div>

    <div id="quiz-section">
        <div class="progress-bar" id="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="question-box" id="question-box">
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options-container"></div>
        </div>
        <div class="controls" id="controls">
            <span id="question-counter">Câu 0/0</span>
            <button class="btn" id="next-btn" disabled onclick="nextQuestion()">Câu Tiếp Theo</button>
        </div>
    </div>

    <div id="score-section" class="score-box">
        <h1>Kết Quả Ôn Tập</h1>
        <p style="font-size: 22px;" id="score-text"></p>
        <button class="btn" onclick="restartQuiz()">Luyện tập lại</button>
    </div>
</div>

<script>
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    // Hàm đọc và xử lý danh sách file Word được chọn
    async function handleFiles(files) {
        if (!files.length) return;
        document.getElementById('status-text').innerText = "Đang đọc dữ liệu từ các file Word...";
        questions = []; // Xóa câu hỏi cũ nếu có

        for (let file of files) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                parseTextToQuestions(result.value);
            } catch (err) {
                console.error("Lỗi đọc file:", file.name, err);
            }
        }

        if (questions.length > 0) {
            // Trộn ngẫu nhiên câu hỏi
            questions.sort(() => Math.random() - 0.5);
            // Ẩn vùng tải file và hiện vùng làm bài
            document.getElementById('upload-area').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('question-box').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            
            currentIndex = 0;
            score = 0;
            showQuestion();
        } else {
            document.getElementById('status-text').innerText = "Không tìm thấy cấu trúc câu hỏi trắc nghiệm hợp lệ trong file. Vui lòng kiểm tra lại.";
        }
    }

    // Hàm phân tách văn bản thô từ file Word thành cấu trúc câu hỏi
    function parseTextToQuestions(text) {
        // Tách văn bản thành các dòng, loại bỏ dòng trống
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        let currentQuestion = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i];

            // Nhận diện dòng bắt đầu câu hỏi (ví dụ: "Câu 1:", "Câu 10.", "1.", "2/")
            if (/^(Câu\s*\d+[:\.]|Câu\s*\d+\s*[\/\)]|\d+[:\.\/\)])/i.test(line)) {
                if (currentQuestion && currentQuestion.question && currentQuestion.answer) {
                    questions.push(currentQuestion);
                }
                // Loại bỏ phần chữ "Câu X: " ở đầu để lấy nội dung câu hỏi sạch
                let cleanQuestion = line.replace(/^(Câu\s*\d+[:\.]|Câu\s*\d+\s*[\/\)]|\d+[:\.\/\)])/i, '').trim();
                currentQuestion = { question: cleanQuestion, A: '', B: '', C: '', D: '', answer: '' };
            } 
            // Nhận diện các lựa chọn đáp án A, B, C, D
            else if (currentQuestion) {
                if (/^[A][:\.\)\s]/i.test(line)) {
                    currentQuestion.A = line.replace(/^[A][:\.\)\s]/i, '').trim();
                } else if (/^[B][:\.\)\s]/i.test(line)) {
                    currentQuestion.B = line.replace(/^[B][:\.\)\s]/i, '').trim();
                } else if (/^[C][:\.\)\s]/i.test(line)) {
                    currentQuestion.C = line.replace(/^[C][:\.\)\s]/i, '').trim();
                } else if (/^[D][:\.\)\s]/i.test(line)) {
                    currentQuestion.D = line.replace(/^[D][:\.\)\s]/i, '').trim();
                } 
                // Nhận diện dòng đáp án đúng (Ví dụ: "Đáp án: A" hoặc "Chọn A" hoặc chỉ ghi "Đúng: A")
                else if (/(Đáp án|Chọn|Đúng|Key)[:\s]*([A-D])/i.test(line)) {
                    let match = line.match(/(Đáp án|Chọn|Đúng|Key)[:\s]*([A-D])/i);
                    if (match) currentQuestion.answer = match[2].toUpperCase();
                }
            }
        }
        // Thêm câu hỏi cuối cùng vào danh sách
        if (currentQuestion && currentQuestion.question && currentQuestion.answer) {
            questions.push(currentQuestion);
        }
    }

    function showQuestion() {
        answered = false;
        document.getElementById('next-btn').disabled = true;
        
        let q = questions[currentIndex];
        document.getElementById('question-text').innerText = `Câu ${currentIndex + 1}: ${q.question}`;
        
        document.getElementById('question-counter').innerText = `Câu ${currentIndex + 1}/${questions.length}`;
        document.getElementById('progress').style.width = `${((currentIndex) / questions.length) * 100}%`;

        let optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        const optionKeys = ['A', 'B', 'C', 'D'];
        optionKeys.forEach(key => {
            if(q[key]) {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${key}. ${q[key]}`;
                btn.onclick = () => selectOption(btn, key, q.answer);
                optionsContainer.appendChild(btn);
            }
        });
    }

    function selectOption(selectedBtn, selectedKey, correctKey) {
        if (answered) return;
        answered = true;

        let buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selectedKey === correctKey) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            buttons.forEach(btn => {
                if (btn.innerText.startsWith(correctKey + '.')) {
                    btn.classList.add('correct');
                }
            });
        }
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        document.getElementById('score-text').innerText = `Bạn trả lời đúng ${score}/${questions.length} câu hỏi.`;
    }

    function restartQuiz() {
        currentIndex = 0;
        score = 0;
        questions.sort(() => Math.random() - 0.5);
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('score-section').style.display = 'none';
        showQuestion();
    }
</script>
</body>
</html>
